name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Daily at 8:00 AM UTC (11:00 AM Bulgaria time) — full regression
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'regression'
        type: choice
        options:
          - smoke
          - regression

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SUITE="smoke"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SUITE="${{ inputs.suite }}"
          else
            SUITE="regression"
          fi

          echo "Running suite: $SUITE"

          if [[ "$SUITE" == "smoke" ]]; then
            npx playwright test --grep "@smoke" --fail-on-flaky-tests
          else
            npx playwright test --fail-on-flaky-tests
          fi

          echo "SUITE=$SUITE" >> $GITHUB_ENV
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STORAGE_TYPE: supabase
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

      - name: Notify admin via Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="<b>E2E Tests Failed</b> [${SUITE}]%0A%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ATrigger: ${{ github.event_name }}%0A%0A<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View logs</a>"
